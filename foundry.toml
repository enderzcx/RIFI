[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
evm_version = "paris"

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "reactive-lib/=lib/reactive-lib/src/",
    "v2-periphery/=lib/v2-periphery/contracts/",
    "v2-core/=lib/v2-core/contracts/",
]
